<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>LaTeX 演示文稿工作台</title>
  <link rel="stylesheet" href="assets/latexfix.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">L</span>
      <div>
        <strong>LaTeX 演示文稿</strong>
        <span id="saveState">草稿已保存</span>
      </div>
    </div>

    <nav class="top-actions" aria-label="页面操作">
      <button class="quiet-btn" id="outlineToggle" type="button" aria-controls="outlinePanel" aria-expanded="false">大纲</button>
      <button class="quiet-btn" id="aiToggle" type="button" aria-controls="aiPanel" aria-expanded="false">AI 辅助</button>
      <a class="quiet-btn link-btn" href="index.html">返回首页</a>
    </nav>
  </header>

  <div class="mobile-tabs" role="tablist" aria-label="工作区视图">
    <button type="button" role="tab" data-mobile-view="preview" aria-selected="true">预览</button>
    <button type="button" role="tab" data-mobile-view="source" aria-selected="false">源码</button>
  </div>

  <main class="workspace" id="workspace" data-mobile-view="preview">
    <aside class="drawer drawer-left" id="outlinePanel" aria-label="文档大纲" aria-hidden="true">
      <div class="drawer-header">
        <strong>文档大纲</strong>
        <button class="icon-btn" type="button" data-close="outline" aria-label="关闭大纲">×</button>
      </div>
      <div class="outline-list" id="outlineList"></div>
    </aside>

    <section class="pane preview-pane" aria-label="PDF 预览">
      <div class="pane-toolbar">
        <div class="pane-title">
          <strong>PDF 预览</strong>
          <span class="status-dot" id="compileDot" data-state="idle" aria-hidden="true"></span>
          <span class="status-text" id="compileStatus" role="status">尚未编译</span>
        </div>
        <div class="toolbar-actions">
          <button class="quiet-btn compact" id="clearPreviewBtn" type="button">清空预览</button>
        </div>
      </div>
      <div class="preview-empty" id="previewEmpty">
        <div class="preview-symbol" aria-hidden="true">PDF</div>
        <strong>从右侧源码开始</strong>
        <p>中文内容会优先使用 XeLaTeX 编译，结果由 TeXLive.net 返回。</p>
      </div>
      <iframe id="pdfFrame" name="pdfFrame" title="LaTeX 编译结果" hidden></iframe>
    </section>

    <section class="pane source-pane" aria-label="LaTeX 源码">
      <div class="pane-toolbar source-toolbar">
        <div class="pane-title"><strong>源码</strong></div>
        <div class="history-controls" aria-label="版本历史">
          <button class="icon-btn" id="undoBtn" type="button" aria-label="撤销到上一版本" disabled>←</button>
          <span id="versionBadge">v1/1</span>
          <button class="icon-btn" id="redoBtn" type="button" aria-label="恢复到下一版本" disabled>→</button>
        </div>
        <div class="toolbar-actions source-actions">
          <label class="select-wrap">
            <span>引擎</span>
            <select id="engineSelect">
              <option value="xelatex">XeLaTeX（中文推荐）</option>
              <option value="lualatex">LuaLaTeX</option>
              <option value="pdflatex">pdfLaTeX</option>
            </select>
          </label>
          <button class="danger-quiet compact" id="cancelCompileBtn" type="button" hidden>停止等待</button>
          <button class="primary-btn compact" id="compileBtn" type="button">编译预览</button>
        </div>
      </div>
      <div class="editor-notice" id="editorNotice" role="status" hidden></div>
      <textarea id="texEditor" aria-label="LaTeX 源码编辑器" spellcheck="false" autocomplete="off"></textarea>
    </section>

    <aside class="drawer drawer-right" id="aiPanel" aria-label="AI 辅助" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <strong>AI 辅助</strong>
          <span>分析排版，也可以安全应用整份源码</span>
        </div>
        <button class="icon-btn" type="button" data-close="ai" aria-label="关闭 AI 辅助">×</button>
      </div>

      <details class="ai-config-fold">
        <summary>
          <strong>模型设置</strong>
          <span id="aiConfigSummary">DeepSeek · deepseek-v4-flash</span>
        </summary>
        <div class="ai-config">
          <label>
            <span>服务</span>
            <select id="providerSelect">
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI</option>
              <option value="gemini">Gemini</option>
              <option value="qwen">千问</option>
            </select>
          </label>
          <label>
            <span>模型</span>
            <select id="modelInput" aria-label="模型选择"></select>
          </label>
          <input id="customModelInput" class="custom-model-input" type="text" autocomplete="off" placeholder="输入自定义模型 ID" hidden>
          <details class="api-key-fold">
            <summary>
              <span>API Key</span>
              <small>点击展开 · 仅本次保留</small>
            </summary>
            <div class="api-key-row">
              <input id="apiKeyInput" aria-label="API Key" type="password" autocomplete="off" placeholder="输入当前服务的 API Key">
              <button id="clearApiKeyBtn" type="button">清除</button>
            </div>
          </details>
          <p>源码会发送给你选择的模型服务；Key 不写入长期存储。</p>
        </div>
      </details>

      <div class="ai-quick-actions" aria-label="AI 快捷操作">
        <button type="button" data-ai-action="diagnose"><span aria-hidden="true">✓</span>检查源码</button>
        <button type="button" data-ai-action="optimize"><span aria-hidden="true">◇</span>优化排版</button>
        <button type="button" data-ai-action="overlays"><span aria-hidden="true">▤</span>控制页数</button>
        <button type="button" data-ai-action="log"><span aria-hidden="true">!</span>分析日志</button>
      </div>

      <div class="chat-messages" id="chatMessages" aria-live="polite">
        <article class="message assistant">
          <div class="message-label">AI 辅助</div>
          <p>我可以检查编译错误、改善 Beamer 页面层次，或根据你的要求修改整份源码。应用修改前会先校验文档结构并保存旧版本。</p>
        </article>
      </div>

      <div class="chat-compose">
        <textarea id="chatInput" rows="3" placeholder="例如：帮我优化这一页的视觉层次，但不要删除内容"></textarea>
        <div class="compose-actions">
          <button class="danger-quiet compact" id="cancelAiBtn" type="button" hidden>停止</button>
          <button class="primary-btn compact" id="sendAiBtn" type="button">发送</button>
        </div>
      </div>
    </aside>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

  <form id="compileForm" action="https://texlive.net/cgi-bin/latexcgi" method="post" enctype="multipart/form-data" target="pdfFrame" hidden>
    <input type="hidden" name="filecontents[]" id="formTex">
    <input type="hidden" name="filename[]" value="document.tex">
    <input type="hidden" name="engine" id="formEngine" value="xelatex">
    <input type="hidden" name="return" value="pdf">
  </form>

  <script src="assets/latexfix.js" defer></script>
</body>
</html>
